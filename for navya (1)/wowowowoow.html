<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Something for you :)</title>

<style>

body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff6a88,#ff99ac);
overflow:hidden;
}

/* card */

.container{
width:90%;
max-width:420px;
background:white;
padding:35px;
border-radius:20px;
text-align:center;
box-shadow:0 20px 60px rgba(0,0,0,0.3);
position:relative;
z-index:100;
}

button{
width:100%;
padding:16px;
font-size:18px;
border:none;
border-radius:12px;
background:#ff3b6f;
color:white;
cursor:pointer;
margin-top:15px;
}

/* NAVYA */

#navyaScreen{
display:none;
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:black;
z-index:10;
}

#navyaText{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:20vw;
letter-spacing:3vw;
color:#ff3b6f;
font-weight:bold;
white-space:nowrap;
}

#navyaText span{
opacity:0;
animation:fade 1s forwards;
}

@keyframes fade{
0%{opacity:0;transform:scale(0.5)}
100%{opacity:1;transform:scale(1)}
}

/* about page */

#aboutPage{
display:none;
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:black;
color:white;
overflow:hidden;
z-index:20;
}

.star{
position:absolute;
background:white;
width:2px;
height:2px;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.2;}
to{opacity:1;}
}

.textContainer{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:85%;
max-width:700px;
text-align:center;
line-height:1.8;
font-size:18px;
}

#text{
white-space:pre-line;
}

</style>
</head>

<body>

<!-- FIRST SCREEN -->

<div class="container" id="main">

<h2>I made something for you</h2>

<button id="tapBtn">Tap here</button>

<div id="question" style="display:none">

<br>

<b>Will you be my girlfriend? ❤️</b>

<button id="continueBtn">Continue ❤️</button>

</div>

</div>

<!-- NAVYA -->

<div id="navyaScreen">

<div id="navyaText">

<span style="animation-delay:0s">N</span>
<span style="animation-delay:0.5s">A</span>
<span style="animation-delay:1s">V</span>
<span style="animation-delay:1.5s">Y</span>
<span style="animation-delay:2s">A</span>

</div>

</div>

<!-- ABOUT PAGE -->

<div id="aboutPage">

<div class="textContainer">

<h1>Something I Wanted To Say</h1>

<div id="text"></div>

<div id="finalQuestion" style="display:none;margin-top:30px">

<b>soo what do you say :)</b>

<button id="yesBtn">YES ❤️</button>
<button id="omgYesBtn">OMG YES ❤️</button>

</div>

</div>

</div>

<!-- MUSIC -->

<audio id="music" preload="auto" loop>
<source src="Him.mp3" type="audio/mpeg">
</audio>

<script>

/* TAP */

document.getElementById("tapBtn").onclick=function(){

let music=document.getElementById("music")

music.play().catch(()=>{})

this.style.display="none"
document.getElementById("question").style.display="block"

}
/* CONTINUE */

document.getElementById("continueBtn").onclick=function(){

document.getElementById("main").style.display="none"
document.body.style.background="black"

showNavya()

}

/* NAVYA */

function showNavya(){

let navya=document.getElementById("navyaScreen")
navya.style.display="block"

setTimeout(showAbout,3500)

}

/* ABOUT PAGE */

function showAbout(){

document.getElementById("navyaScreen").style.display="none"

let about=document.getElementById("aboutPage")
about.style.display="block"

for(let i=0;i<200;i++){

let star=document.createElement("div")
star.className="star"

star.style.left=Math.random()*100+"vw"
star.style.top=Math.random()*100+"vh"

about.appendChild(star)

}

typeWriter()

}

/* MESSAGE */

let message = `

If you're reading this...

then you actually stayed
until the end of the website.

And that already means a lot.

Because this wasn't just some
random page I made.

I made this thinking about you.

About the way you talk,
the way you laugh,
and the way you somehow
make normal days feel
a little more interesting.

I don't know if you realize it,
but you have this energy
that people notice.

At least I did.

And somewhere between
normal conversations,
random moments,
and stupid jokes...

you slowly became
someone important to me.

This wasn't meant to be
a big dramatic thing.

I just wanted to say
what I honestly feel.

I like you.

Not in a random way,
not in a temporary way.

But in the kind of way
where I genuinely enjoy
talking to you,
being around you,
and just knowing you exist.

So yeah...

this whole little website
was really just for one person.

You.

And if you're still reading this...

thank you for giving it
a chance.

❤️
`

let i=0

function typeWriter(){

if(i < message.length){

document.getElementById("text").innerHTML += message.charAt(i)
i++

setTimeout(typeWriter,35)

}else{

document.getElementById("finalQuestion").style.display="block"

}

}

/* FINAL ANSWER */

document.addEventListener("click",function(e){

if(e.target.id==="yesBtn" || e.target.id==="omgYesBtn"){

startProposal()

}

})

/* CELEBRATION */

function startProposal(){

document.getElementById("aboutPage").style.display="none"

const omg=document.createElement("div")

omg.innerText="O M G"

omg.style.color="white"
omg.style.fontSize="60px"
omg.style.letterSpacing="15px"
omg.style.position="absolute"
omg.style.top="40%"
omg.style.left="50%"
omg.style.transform="translate(-50%,-50%)"
omg.style.opacity="0"
omg.style.transition="opacity 2s"

document.body.appendChild(omg)

setTimeout(()=>{omg.style.opacity="1"},200)

/* HEART BURST */

setTimeout(()=>{

for(let i=0;i<60;i++){

let h=document.createElement("div")

h.innerHTML="❤️"
h.style.position="absolute"
h.style.left="50%"
h.style.top="50%"
h.style.fontSize="30px"

let angle=Math.random()*Math.PI*2
let radius=300+Math.random()*300

document.body.appendChild(h)

setTimeout(()=>{
h.style.transition="all 1.5s ease-out"
h.style.transform=`translate(${Math.cos(angle)*radius}px,${Math.sin(angle)*radius}px)`
h.style.opacity="0"
},50)

setTimeout(()=>h.remove(),1600)

}

},2000)

/* YES TEXT */

setTimeout(()=>{

let text=document.createElement("div")

text.innerHTML="She Said YES ❤️"

text.style.color="#ff4d6d"
text.style.fontSize="70px"
text.style.textShadow="0 0 30px #ff4d6d"
text.style.position="absolute"
text.style.top="55%"
text.style.left="50%"
text.style.transform="translate(-50%,-50%)"
text.style.opacity="0"
text.style.transition="opacity 2s"

document.body.appendChild(text)

setTimeout(()=>{text.style.opacity="1"},100)

},3500)

}

</script>

</body>
</html>
